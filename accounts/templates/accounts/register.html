{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card mx-auto shadow" style="max-width: 450px; padding: 20px;">
        <h2 class="text-center" style="color: #d11d53;">Crear Cuenta ✨</h2>
        <form method="POST" class="mt-3">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-custom w-100 mt-3">Registrarme</button>
        </form>
    </div>
</div>
{% endblock %}
