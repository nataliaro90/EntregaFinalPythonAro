{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h2 style="color: #d11d53;">Mis Mensajes 📥</h2>
    <a href="{% url 'enviar_mensaje' %}" class="btn btn-custom mb-3">Nuevo Mensaje</a>
    {% for m in mensajes %}
        <div class="card mb-2 p-3">
            <strong>De: {{ m.emisor }}</strong>
            <p>{{ m.contenido }}</p>
            <small class="text-muted">{{ m.fecha }}</small>
        </div>
    {% empty %}
        <p>No tenés mensajes nuevos.</p>
    {% endfor %}
</div>
{% endblock %}
