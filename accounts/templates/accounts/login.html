{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card mx-auto shadow" style="max-width: 400px; padding: 20px;">
        <h2 class="text-center" style="color: #d11d53;">Iniciar Sesión 🌸</h2>
        <form method="POST" class="mt-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-custom w-100 mt-3">Entrar</button>
        </form>
        <p class="text-center mt-3">¿No tienes cuenta? <a href="{% url 'register' %}" style="color: #ff69b4;">Regístrate acá</a></p>
    </div>
</div>
{% endblock %}
