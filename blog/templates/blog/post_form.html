{% extends 'base.html' %}
{% block content %}
<div class="card mx-auto shadow-lg p-4" style="max-width: 700px; border-radius: 20px;">
    <h2 style="color: #d11d53;">✨ Gestionar Publicación</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-custom w-100">Guardar Cambios 🌸</button>
    </form>
</div>
{% endblock %}
