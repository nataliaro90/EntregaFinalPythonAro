{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card mx-auto shadow-lg" style="max-width: 800px; overflow: hidden;">
        {% if post.imagen %}
            <img src="{{ post.imagen.url }}" class="img-fluid" style="width: 100%; max-height: 400px; object-fit: cover;">
        {% endif %}
        <div class="p-4">
            <h1 style="color: #d11d53;">{{ post.titulo }}</h1>
            <h4 class="text-muted">{{ post.subtitulo }}</h4>
            <hr>
            <div class="my-4" style="line-height: 1.8;">
                {{ post.cuerpo|safe }}
            </div>
            <hr>
            <p class="text-muted">Escrito por: <strong>{{ post.autor }}</strong> el {{ post.fecha|date:"d/m/Y" }}</p>
            <a href="{% url 'inicio' %}" class="btn btn-custom">Volver al inicio</a>
        </div>
    </div>
</div>
{% endblock %}
